name: ML Nightly Retrain

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ml-nightly-retrain
  cancel-in-progress: false

jobs:
  retrain-and-publish:
    runs-on: ubuntu-latest
    env:
      ML_USE_SUPABASE: 'true'
      SUPABASE_DB_CONNECTION_STRING: ${{ secrets.SUPABASE_DB_CONNECTION_STRING }}
      PYTHONUTF8: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run ML test suite
        run: python -m pytest ml/tests

      - name: Retrain and publish nightly ML outputs
        run: python ml/scripts/refresh_supabase_ml.py

      - name: Upload nightly ML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-nightly-artifacts
          path: |
            ml/reports/evaluation
            ml/app-integration/payload_examples
          if-no-files-found: warn
